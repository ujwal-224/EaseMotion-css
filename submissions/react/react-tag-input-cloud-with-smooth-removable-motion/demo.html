<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Tag Input Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load standard component CSS -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel to compile JSX in the browser for this demo -->
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Note: We define the component inside the HTML for the CI demo using Babel -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const TagInput = ({ initialTags = [], placeholder = "Add a tag...", onChange }) => {
      const [tags, setTags] = useState(
        initialTags.map(tag => ({ id: Math.random().toString(36).substr(2, 9), text: tag, isRemoving: false }))
      );
      const [inputValue, setInputValue] = useState('');
      const inputRef = useRef(null);

      useEffect(() => {
        if (onChange) {
          onChange(tags.filter(t => !t.isRemoving).map(t => t.text));
        }
      }, [tags, onChange]);

      const addTag = (text) => {
        const trimmed = text.trim();
        if (!trimmed || tags.some(t => !t.isRemoving && t.text.toLowerCase() === trimmed.toLowerCase())) {
          return;
        }
        
        setTags([...tags, { id: Math.random().toString(36).substr(2, 9), text: trimmed, isRemoving: false }]);
        setInputValue('');
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          addTag(inputValue);
        } else if (e.key === 'Backspace' && !inputValue) {
          const activeTags = tags.filter(t => !t.isRemoving);
          if (activeTags.length > 0) {
            removeTag(activeTags[activeTags.length - 1].id);
          }
        }
      };

      const removeTag = (idToRemove) => {
        setTags(currentTags => 
          currentTags.map(tag => 
            tag.id === idToRemove ? { ...tag, isRemoving: true } : tag
          )
        );

        setTimeout(() => {
          setTags(currentTags => currentTags.filter(tag => tag.id !== idToRemove));
        }, 300);
      };

      const handleContainerClick = () => {
        if (inputRef.current) {
          inputRef.current.focus();
        }
      };

      return (
        <div className="ease-tag-input-container" onClick={handleContainerClick}>
          <div className="ease-tag-cloud">
            {tags.map((tag) => (
              <div 
                key={tag.id} 
                className={`ease-tag ${tag.isRemoving ? 'ease-tag-removing' : 'ease-tag-entering'}`}
              >
                <span className="ease-tag-text">{tag.text}</span>
                <button 
                  type="button"
                  className="ease-tag-remove-btn" 
                  onClick={(e) => {
                    e.stopPropagation();
                    removeTag(tag.id);
                  }}
                  aria-label={`Remove ${tag.text} tag`}
                >
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
              </div>
            ))}
            
            <input
              ref={inputRef}
              type="text"
              className="ease-tag-input-field"
              value={inputValue}
              onChange={(e) => setInputValue(e.target.value)}
              onKeyDown={handleKeyDown}
              onBlur={() => addTag(inputValue)}
              placeholder={tags.filter(t => !t.isRemoving).length === 0 ? placeholder : ''}
              aria-label="Add new tag"
            />
          </div>
        </div>
      );
    };

    // Render App
    const App = () => {
      const [currentTags, setCurrentTags] = useState(['React', 'EaseMotion', 'CSS Animations']);

      return (
        <div style={{width: '100%', maxWidth: '600px'}}>
          <h1 style={{fontFamily: 'sans-serif', color: '#1e293b', marginBottom: '0.5rem'}}>React Tag Input</h1>
          <p style={{fontFamily: 'sans-serif', color: '#64748b', marginBottom: '2rem'}}>Type and press enter. Click the X or press backspace to remove.</p>
          
          <TagInput 
            initialTags={['React', 'EaseMotion', 'CSS Animations']} 
            onChange={(tags) => setCurrentTags(tags)}
          />

          <div style={{marginTop: '2rem', padding: '1rem', background: '#e2e8f0', borderRadius: '8px', fontFamily: 'monospace', fontSize: '0.875rem'}}>
            <strong>Current State:</strong> {JSON.stringify(currentTags)}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
