<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slide Animation Fix Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-slide-in" style="
        position: absolute; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        padding: 20px; 
        background: #f3f4f6; 
        border: 2px solid #7c3aed;
    ">
        <h3>Positioning Test</h3>
        <p>If it is in center, then fix is working properly!</p>
    </div>
</body>
</html>
