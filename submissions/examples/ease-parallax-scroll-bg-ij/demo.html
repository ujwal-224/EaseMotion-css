<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Scroll BG - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="psb-scroll-wrap" id="psbWrap">
    <div class="psb-layer psb-layer--back" style="--psb-speed: 0.2;">Back Layer</div>
    <div class="psb-layer psb-layer--mid" style="--psb-speed: 0.5;">Mid Layer</div>
    <div class="psb-layer psb-layer--front" style="--psb-speed: 0.8;">Front Layer</div>
    <div class="psb-content">
      <h1>Scroll Down</h1>
      <div class="psb-spacer"></div>
      <p>Parallax depth effect in action.</p>
      <div class="psb-spacer"></div>
    </div>
  </div>
  <script>
    var wrap = document.getElementById('psbWrap');
    var layers = wrap.querySelectorAll('.psb-layer');
    wrap.addEventListener('scroll', function() {
      var scrollY = wrap.scrollTop;
      layers.forEach(function(layer) {
        var speed = parseFloat(layer.style.getPropertyValue('--psb-speed')) || 0.5;
        layer.style.setProperty('--psb-offset', (scrollY * speed) + 'px');
      });
    });
  </script>
</body>
</html>
