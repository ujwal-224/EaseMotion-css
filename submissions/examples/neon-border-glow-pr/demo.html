<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Border Glow Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #020617;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    .neon-glow-card {
      width: 220px;
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="neon-glow-card">
    Neon Glow
  </div>

  <div class="neon-glow-card neon-glow-card-pink">
    Pink Neon
  </div>

  <div class="neon-glow-card neon-glow-card-green">
    Green Neon
  </div>

</body>
</html>
