<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCI Training Studio — Phase #748</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="studio-header fade-in">
    <div class="brand">
      <div class="brand-icon"></div>
      NEURO-SYNC STUDIO
    </div>
    <div class="session-info">
      <div class="info-box">
        <span class="info-val">Subject-042</span>
        <span class="info-lbl">Active Profile</span>
      </div>
      <div class="info-box">
        <span class="info-val" style="color: var(--clr-purple)">04:12:08</span>
        <span class="info-lbl">Session Time</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Brainwave Frequencies -->
    <aside class="panel fade-up">
      <div class="panel-title">CORTICAL FREQUENCIES</div>
      
      <div class="wave-group beta">
        <div class="w-hdr">
          <span class="w-lbl">Beta (Active Focus)</span>
          <span class="w-val">22 Hz</span>
        </div>
        <div class="w-vis"><div class="w-line"></div></div>
      </div>

      <div class="wave-group alpha">
        <div class="w-hdr">
          <span class="w-lbl">Alpha (Relaxed)</span>
          <span class="w-val">10 Hz</span>
        </div>
        <div class="w-vis"><div class="w-line"></div></div>
      </div>

      <div class="wave-group theta">
        <div class="w-hdr">
          <span class="w-lbl">Theta (Deep State)</span>
          <span class="w-val">6 Hz</span>
        </div>
        <div class="w-vis"><div class="w-line"></div></div>
      </div>

    </aside>

    <!-- Center: Cognitive Sync Rings & Stream -->
    <section class="panel sync-panel fade-in delay-1" style="padding: 0; background: transparent; border: none; box-shadow: none; backdrop-filter: none;">
      <div class="sync-view">
        
        <div class="sync-core">
          <div class="s-ring outer"></div>
          <div class="s-ring mid"></div>
          <div class="s-ring inner"></div>
          <div class="s-focus">84</div>
        </div>

        <div class="stream-container">
          <div class="stream-bar"></div>
          <div class="stream-bar"></div>
          <div class="stream-bar"></div>
          <div class="stream-bar"></div>
          <div class="stream-bar"></div>
        </div>

      </div>
    </section>

    <!-- Right Sidebar: Objectives & Score -->
    <aside class="panel fade-up delay-2">
      
      <div class="score-card">
        <div class="sc-val">84</div>
        <div class="sc-lbl">Cognitive Sync Score</div>
      </div>

      <div class="panel-title">TRAINING OBJECTIVES</div>
      
      <div class="obj-list">
        <div class="obj-item">
          <div class="obj-hdr">
            <span class="obj-name">Motor Cortex Mapping</span>
            <span class="obj-stat">75%</span>
          </div>
          <div class="obj-bar"><div class="obj-fill" style="width: 75%;"></div></div>
        </div>
        <div class="obj-item">
          <div class="obj-hdr">
            <span class="obj-name">Visual Stimuli Response</span>
            <span class="obj-stat" style="color: var(--clr-teal)">100%</span>
          </div>
          <div class="obj-bar"><div class="obj-fill" style="width: 100%; background: var(--clr-teal); box-shadow: var(--glow-teal);"></div></div>
        </div>
        <div class="obj-item">
          <div class="obj-hdr">
            <span class="obj-name">Sustained Alpha State</span>
            <span class="obj-stat" style="color: var(--clr-purple)">40%</span>
          </div>
          <div class="obj-bar"><div class="obj-fill" style="width: 40%; background: var(--clr-purple); box-shadow: var(--glow-purple);"></div></div>
        </div>
      </div>

    </aside>

  </main>

</body>
</html>
