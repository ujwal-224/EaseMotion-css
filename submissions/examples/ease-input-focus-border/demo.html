<head>

<body>
  <h1>Input Focus Border</h1>
  <p class="subtitle">An input with animated focus border — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="field"><label>Email</label><input type="email" class="focus-input" placeholder="you@example.com"></div><div class="field"><label>Password</label><input type="password" class="focus-input error" placeholder="Min 8 chars"></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;input class=&quot;focus-input&quot; placeholder=&quot;Text&quot;&gt;
