<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Floating Counter - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .demo-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 40px;
      max-width: 1000px;
    }

    h1 {
      position: absolute;
      top: 40px;
      left: 40px;
      color: white;
      font-size: 32px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <h1>Floating Counters</h1>
  
  <div class="demo-container">
    <!-- Counter 1: Blue -->
    <div class="floating-counter">
      <div class="counter-inner">
        <div class="counter-number" data-target="1250">0</div>
        <div class="counter-label">Projects</div>
      </div>
      <div class="counter-pulse"></div>
    </div>

    <!-- Counter 2: Green -->
    <div class="floating-counter floating-counter-green">
      <div class="counter-inner">
        <div class="counter-number" data-target="98">0</div>
        <span class="counter-suffix">%</span>
        <div class="counter-label">Success Rate</div>
      </div>
      <div class="counter-pulse"></div>
    </div>

    <!-- Counter 3: Orange -->
    <div class="floating-counter floating-counter-orange">
      <div class="counter-inner">
        <div class="counter-number" data-target="24">0</div>
        <span class="counter-suffix">h</span>
        <div class="counter-label">Response Time</div>
      </div>
      <div class="counter-pulse"></div>
    </div>

    <!-- Counter 4: Pink -->
    <div class="floating-counter floating-counter-pink">
      <div class="counter-inner">
        <div class="counter-number" data-target="5000">0</div>
        <div class="counter-label">Happy Users</div>
      </div>
      <div class="counter-pulse"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
