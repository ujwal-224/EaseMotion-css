<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Card</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="glass-card">
      <div class="glass-icon">✨</div>
      <h2 class="glass-title">Glassmorphism</h2>
      <p class="glass-desc">A frosted glass effect with backdrop blur, semi-transparent background, and a subtle border highlight.</p>
      <div class="glass-meta">Trending now</div>
    </div>
  </div>
</body>
</html>
