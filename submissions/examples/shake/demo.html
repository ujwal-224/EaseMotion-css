<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-shake — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: #6366f1;
      color: #fff;
    }
    .bell {
      font-size: 2rem;
      cursor: pointer;
      display: inline-block;
    }
  </style>
</head>
<body>

  <h1>ease-shake Demo</h1>

  <div class="section">
    <div class="label">Intensity variants (hover each)</div>
    <div class="row">
      <button class="ease-shake ease-shake-subtle">Subtle</button>
      <button class="ease-shake">Default</button>
      <button class="ease-shake ease-shake-hard">Hard</button>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <button class="ease-shake ease-shake-fast">Fast</button>
      <button class="ease-shake">Default</button>
      <button class="ease-shake ease-shake-slow">Slow</button>
    </div>
  </div>

  <div class="section">
    <div class="label">Loop variant (notification bell)</div>
    <div class="row">
      <span class="bell ease-shake-loop">🔔</span>
    </div>
  </div>

</body>
</html>
