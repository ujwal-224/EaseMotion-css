<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Trading Terminal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">

    <aside class="watchlist">

        <h2>Markets</h2>

        <div class="asset">
            <strong>BTC</strong>
            <span class="up">+2.4%</span>
        </div>

        <div class="asset">
            <strong>ETH</strong>
            <span class="up">+1.8%</span>
        </div>

        <div class="asset">
            <strong>SOL</strong>
            <span class="down">-0.9%</span>
        </div>

        <div class="asset">
            <strong>ADA</strong>
            <span class="up">+3.1%</span>
        </div>

    </aside>

    <main class="chart-section">

        <div class="chart-header">

            <h1>BTC / USD</h1>

            <span class="price">
                $108,245
            </span>

        </div>

        <div class="chart">

            <div class="bar" style="height:40%"></div>
            <div class="bar" style="height:65%"></div>
            <div class="bar" style="height:50%"></div>
            <div class="bar" style="height:85%"></div>
            <div class="bar" style="height:70%"></div>
            <div class="bar" style="height:95%"></div>
            <div class="bar" style="height:80%"></div>

        </div>

    </main>

    <aside class="trade-panel">

        <h2>Trade</h2>

        <input type="text" placeholder="Amount">

        <button class="buy">
            Buy
        </button>

        <button class="sell">
            Sell
        </button>

        <div class="portfolio">

            <h3>Portfolio</h3>

            <p>Balance: $12,450</p>

            <p>PnL: +$1,820</p>

        </div>

    </aside>

</div>

</body>
</html>
