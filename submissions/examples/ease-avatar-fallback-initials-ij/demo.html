<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Fallback Initials - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="afi-wrapper">
    <h1>Avatar Fallback Initials</h1>
    <p class="afi-desc">Hover each avatar to reveal the full name via <code>attr()</code></p>
    <div class="afi-grid">
      <div class="afi-avatar" data-afi-name="John Doe" style="--afi-color: #6366f1; --afi-size: 56px;">
        <span class="afi-initials">JD</span>
      </div>
      <div class="afi-avatar" data-afi-name="Alice Kim" style="--afi-color: #ec4899; --afi-size: 64px;">
        <span class="afi-initials">AK</span>
      </div>
      <div class="afi-avatar" data-afi-name="Mike Lee" style="--afi-color: #f97316; --afi-size: 72px;">
        <span class="afi-initials">ML</span>
      </div>
      <div class="afi-avatar" data-afi-name="Sarah Chen" style="--afi-color: #10b981; --afi-size: 48px;">
        <span class="afi-initials">SC</span>
      </div>
      <div class="afi-avatar" data-afi-name="Raj Patel" style="--afi-color: #8b5cf6; --afi-size: 60px;">
        <span class="afi-initials">RP</span>
      </div>
      <div class="afi-avatar" data-afi-name="Emma Wilson" style="--afi-color: #06b6d4; --afi-size: 52px;">
        <span class="afi-initials">EW</span>
      </div>
    </div>
  </div>
</body>
</html>
