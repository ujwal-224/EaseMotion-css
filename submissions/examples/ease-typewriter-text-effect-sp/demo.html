<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Typewriter Text Effect</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>EaseMotion CSS</h1>

        <div class="typewriter">
            <span id="type-text"></span>
            <span class="cursor">|</span>
        </div>
    </div>

    <script>
const text = "Create Beautiful Animations with EaseMotion CSS";
const typingElement = document.getElementById("type-text");

let index = 0;
let isDeleting = false;

function typeWriter() {

    if (!isDeleting) {
        typingElement.textContent = text.substring(0, index);
        index++;

        if (index > text.length) {
            isDeleting = true;
            setTimeout(typeWriter, 1500);
            return;
        }
    } else {
        typingElement.textContent = text.substring(0, index);
        index--;

        if (index < 0) {
            isDeleting = false;
            index = 0;
        }
    }

    setTimeout(typeWriter, isDeleting ? 40 : 80);
}

typeWriter();
</script>

</body>
</html>
