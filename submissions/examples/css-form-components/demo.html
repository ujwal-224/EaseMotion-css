<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Form Components - EaseMotion CSS</title>
  
  <!-- Load Core EaseMotion CSS so we have fonts and variables -->
  <link rel="stylesheet" href="../../../easemotion.css">
  
  <!-- Load our custom styles for this feature -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* Demo presentation layout - you don't need to add this to the actual framework */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      padding: 4rem 2rem;
      font-family: 'Inter', sans-serif;
    }
    .demo-card {
      width: 100%;
      max-width: 450px;
      padding: 2.5rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #334155;
      font-size: 0.875rem;
    }
    h2 {
      margin-top: 0;
      color: #0f172a;
      margin-bottom: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="demo-card ease-slide-up">
    <h2>Account Settings</h2>
    
    <!-- Text Input Demo -->
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="ease-input" placeholder="e.g. Saptarshi Sadhu">
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="ease-input" placeholder="developer@example.com">
    </div>

    <!-- Radio Buttons Demo -->
    <div class="form-group" style="margin-top: 2rem;">
      <label class="form-label">Subscription Plan</label>
      <div class="ease-flex ease-flex-col ease-gap-3">
        <label class="ease-radio-wrapper">
          <input type="radio" name="plan" class="ease-radio-input" checked>
          <span class="ease-radio-circle"></span>
          Free Plan ($0/mo)
        </label>
        
        <label class="ease-radio-wrapper">
          <input type="radio" name="plan" class="ease-radio-input">
          <span class="ease-radio-circle"></span>
          Pro Plan ($12/mo)
        </label>
      </div>
    </div>

    <!-- Checkboxes Demo -->
    <div class="form-group" style="margin-top: 2rem;">
      <label class="form-label">Preferences</label>
      <div class="ease-flex ease-flex-col ease-gap-3">
        <label class="ease-checkbox-wrapper">
          <input type="checkbox" class="ease-checkbox-input" checked>
          <span class="ease-checkbox-box"></span>
          Subscribe to newsletter
        </label>
        
        <label class="ease-checkbox-wrapper">
          <input type="checkbox" class="ease-checkbox-input">
          <span class="ease-checkbox-box"></span>
          Enable two-factor authentication
        </label>
      </div>
    </div>
    
    <button class="ease-btn ease-btn-primary" style="width: 100%; margin-top: 1rem;">Save Changes</button>

  </div>

</body>
</html>
