<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-parallax — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      gap: 2rem;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.5;
    }
    .section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 3rem; font-weight: 800; }
    h2 { font-size: 1.5rem; font-weight: 600; color: #ccc; }
    p  { color: #888; max-width: 400px; }
    .label { font-size: 0.75rem; color: #555; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="blob ease-parallax ease-parallax-slow"
         style="width:400px;height:400px;background:#7873f5;top:-100px;left:-100px;"></div>
    <div class="blob ease-parallax ease-parallax-fast"
         style="width:300px;height:300px;background:#ec4899;bottom:-80px;right:-80px;"></div>
    <div class="blob ease-parallax ease-parallax-medium"
         style="width:200px;height:200px;background:#4adede;top:40%;left:50%;"></div>
    <h1 class="ease-parallax ease-parallax-slow">Scroll Down</h1>
    <p class="ease-parallax ease-parallax-medium">Each layer moves at a different speed as you scroll.</p>
  </div>

  <div class="section">
    <div class="label">ease-parallax-fade</div>
    <h2 class="ease-parallax ease-parallax-fade">Fades as you scroll</h2>
    <p>Combines translateY with opacity for a depth fade effect.</p>
  </div>

  <div class="section">
    <div class="label">Horizontal parallax</div>
    <h2 class="ease-parallax ease-parallax-left">Slides Left</h2>
    <h2 class="ease-parallax ease-parallax-right">Slides Right</h2>
  </div>

</body>
</html>
