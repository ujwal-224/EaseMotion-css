<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Date Picker - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cdp-demo">
    <h1>Calendar Date Picker</h1>
    <p class="cdp-desc">Click a date to select it. The current date is highlighted with a pulse ring.</p>

    <div class="cdp-calendar">
      <div class="cdp-header">
        <button class="cdp-nav" aria-label="Previous month">&larr;</button>
        <span class="cdp-month-year">July 2026</span>
        <button class="cdp-nav" aria-label="Next month">&rarr;</button>
      </div>
      <div class="cdp-weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="cdp-grid">
        <span class="cdp-day cdp-other">29</span>
        <span class="cdp-day cdp-other">30</span>
        <span class="cdp-day" data-date="2026-07-01" data-today>1</span>
        <span class="cdp-day" data-date="2026-07-02">2</span>
        <span class="cdp-day" data-date="2026-07-03">3</span>
        <span class="cdp-day" data-date="2026-07-04">4</span>
        <span class="cdp-day" data-date="2026-07-05">5</span>
        <span class="cdp-day" data-date="2026-07-06">6</span>
        <span class="cdp-day" data-date="2026-07-07">7</span>
        <span class="cdp-day" data-date="2026-07-08">8</span>
        <span class="cdp-day" data-date="2026-07-09">9</span>
        <span class="cdp-day" data-date="2026-07-10">10</span>
        <span class="cdp-day" data-date="2026-07-11">11</span>
        <span class="cdp-day" data-date="2026-07-12">12</span>
        <span class="cdp-day" data-date="2026-07-13">13</span>
        <span class="cdp-day" data-date="2026-07-14">14</span>
        <span class="cdp-day" data-date="2026-07-15">15</span>
        <span class="cdp-day" data-date="2026-07-16">16</span>
        <span class="cdp-day" data-date="2026-07-17">17</span>
        <span class="cdp-day" data-date="2026-07-18">18</span>
        <span class="cdp-day" data-date="2026-07-19">19</span>
        <span class="cdp-day" data-date="2026-07-20">20</span>
        <span class="cdp-day" data-date="2026-07-21">21</span>
        <span class="cdp-day" data-date="2026-07-22">22</span>
        <span class="cdp-day" data-date="2026-07-23">23</span>
        <span class="cdp-day" data-date="2026-07-24">24</span>
        <span class="cdp-day" data-date="2026-07-25">25</span>
        <span class="cdp-day" data-date="2026-07-26">26</span>
        <span class="cdp-day" data-date="2026-07-27">27</span>
        <span class="cdp-day" data-date="2026-07-28">28</span>
        <span class="cdp-day" data-date="2026-07-29">29</span>
        <span class="cdp-day" data-date="2026-07-30">30</span>
        <span class="cdp-day" data-date="2026-07-31">31</span>
        <span class="cdp-day cdp-other">1</span>
        <span class="cdp-day cdp-other">2</span>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.cdp-day:not(.cdp-other)').forEach(function(day) {
      day.addEventListener('click', function() {
        document.querySelectorAll('.cdp-day.cdp-selected').forEach(function(s) {
          s.classList.remove('cdp-selected');
        });
        this.classList.add('cdp-selected');
      });
    });
  </script>
</body>
</html>
