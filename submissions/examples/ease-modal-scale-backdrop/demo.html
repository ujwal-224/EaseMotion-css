<!DOCTYPE html>

<head>

<body>
  <h1>Modal Scale Backdrop</h1>
  <p class="subtitle">A modal with scale-in animation and backdrop fade — pure CSS.</p>

  <section class="docs"><h2>Usage</h2><pre><code>&lt;div class=&quot;modal-backdrop&quot;&gt;
  &lt;div class=&quot;modal-box&quot;&gt;
    &lt;h3&gt;Modal Title&lt;/h3&gt;
    &lt;p&gt;Modal content&lt;/p&gt;
  &lt;/div&gt;
&lt;/div&gt;</code></pre></section>
