<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Toast Notification</h1>
    <p class="desc">Animated toast with slide-in and auto-dismiss</p>
    <div class="toast-area" id="toastArea">
      <div class="toast-container" id="toastContainer"></div>
    </div>
    <div class="toast-controls">
      <button class="t-btn" data-type="success">Success</button>
      <button class="t-btn" data-type="error">Error</button>
      <button class="t-btn" data-type="info">Info</button>
    </div>
  </div>
  <script>
    const container = document.getElementById('toastContainer');
    const icons = { success: '✓', error: '✕', info: 'ℹ' };

    document.querySelectorAll('.t-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.style.setProperty('--ts-show', 0);
        toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span class="toast-msg">${type.charAt(0).toUpperCase() + type.slice(1)} notification</span>`;
        container.appendChild(toast);

        requestAnimationFrame(() => toast.style.setProperty('--ts-show', 1));

        setTimeout(() => {
          toast.style.setProperty('--ts-show', 0);
          setTimeout(() => toast.remove(), 400);
        }, 3000);
      });
    });
  </script>
</body>
</html>
