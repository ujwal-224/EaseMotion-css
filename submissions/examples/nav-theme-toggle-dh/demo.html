<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Bar Theme Toggle Fix — EaseMotion CSS</title>
  <!-- Load EaseMotion CSS from the local relative path -->
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <!-- Load custom style containing theme variables and layouts -->
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var t = localStorage.getItem("em-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Navigation Theme Toggle Fix</h1>
      <p>
        On the Live Demo page, the top navigation bar's background, border, and text links did not update when toggling from the dark theme to the light theme because they used hardcoded dark values.
