<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Progress Circle Dash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ease Progress Circle Dash</h1>

    <div class="progress-wrapper">
        <svg class="progress-circle" width="220" height="220">

            <circle
                class="bg-circle"
                cx="110"
                cy="110"
                r="90">
            </circle>

            <circle
                class="progress"
                cx="110"
                cy="110"
                r="90">
            </circle>

        </svg>

        <div class="percentage">
            75%
        </div>

    </div>

</div>

</body>
</html>
