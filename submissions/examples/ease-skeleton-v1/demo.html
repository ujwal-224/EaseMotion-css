<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-skeleton — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="theme-switch-container">
    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle structural theme">
      <svg class="sun-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"></circle>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
      </svg>
      <svg class="moon-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
      </svg>
    </button>
  </div>

  <header class="showcase-header">
    <div class="brand-badge">EaseMotion UI</div>
    <h1>Skeleton Placeholders</h1>
    <p>Hardware-accelerated content-loading states engineered with adaptive token primitives.</p>
  </header>

  <main class="container">

    <section class="section">
      <div class="label">Profile Card Blueprint</div>
      <div class="profile-card">
        <div class="profile-top">
          <span class="ease-skeleton ease-skeleton--circle"></span>
          <div class="profile-info">
            <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 65%; --ease-height: 14px;"></span>
            <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 40%; --ease-height: 11px;"></span>
          </div>
        </div>
        <div class="profile-bio-lines">
          <span class="ease-skeleton" style="--ease-height: 12px;"></span>
          <span class="ease-skeleton" style="--ease-width: 88%; --ease-height: 12px;"></span>
          <span class="ease-skeleton" style="--ease-width: 60%; --ease-height: 12px;"></span>
        </div>
        <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 110px; --ease-height: 36px; margin-top: 6px;"></span>
      </div>
    </section>

    <section class="section">
      <div class="label">Article Card Blueprint</div>
      <div class="article-card">
        <span class="ease-skeleton ease-skeleton--rect" style="--ease-width: 100%; --ease-height: 180px;"></span>
        <div class="article-body">
          <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 75px; --ease-height: 18px;"></span>
          <div class="article-title-stack">
            <span class="ease-skeleton" style="--ease-height: 16px;"></span>
            <span class="ease-skeleton" style="--ease-width: 75%; --ease-height: 16px;"></span>
          </div>
          <span class="ease-skeleton" style="--ease-width: 45%; --ease-height: 11px; margin-top: 4px;"></span>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="label">Analytical Matrix Row</div>
      <div class="stats-row">
        <div class="stat-card">
          <span class="ease-skeleton ease-skeleton--circle" style="--ease-width: 40px; --ease-height: 40px;"></span>
          <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 75%; --ease-height: 18px;"></span>
          <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 50%; --ease-height: 11px;"></span>
        </div>
        <div class="stat-card">
          <span class="ease-skeleton ease-skeleton--circle" style="--ease-width: 40px; --ease-height: 40px;"></span>
          <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 75%; --ease-height: 18px;"></span>
          <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 50%; --ease-height: 11px;"></span>
        </div>
        <div class="stat-card">
          <span class="ease-skeleton ease-skeleton--circle" style="--ease-width: 40px; --ease-height: 40px;"></span>
          <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 75%; --ease-height: 18px;"></span>
          <span class="ease-skeleton ease-skeleton--rounded" style="--ease-width: 50%; --ease-height: 11px;"></span>
        </div>
      </div>
    </section>

  </main>

  <script>
    const themeToggleBtn = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;

    // Load persisted runtime configuration preferences
    const preservedThemePreference = localStorage.getItem('skeleton-theme') || 
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    
    htmlElement.setAttribute('data-theme', preservedThemePreference);

    themeToggleBtn.addEventListener('click', () => {
      const activeState = htmlElement.getAttribute('data-theme');
      const replacementState = activeState === 'dark' ? 'light' : 'dark';
      htmlElement.setAttribute('data-theme', replacementState);
      localStorage.setItem('skeleton-theme', replacementState);
    });
  </script>

</body>
</html>
